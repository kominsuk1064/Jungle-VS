<!doctype html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jungle Vs</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }

        .animated-bg {
            background: linear-gradient(-45deg,
                    #00d1b2,
                    #ebfffc,
                    #ebfffa,
                    #00d1b2,
                    #effaf5);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }
    </style>
</head>

<body>
    <section class="hero is-fullheight ">
        <div class="animated-bg hero-body is-flex is-justify-content-center is-align-items-center">
            <div class="box has-text-centered has-background-success-light" style="min-height: 400px;">
                <h1 class="title is-1 m-5">Make a Topic</h1>
                <p class="subtitle">새로운 VS 주제를 등록해보세요!</p>
                <div class="field is-flex is-align-items-center is-justify-content-center mt-5">
                    <div class="control">
                        <input id="input-left" class="input is-medium is-info" type="text" placeholder="항목 A 입력" />
                    </div>
                    <label class="label mx-4 mb-0">VS</label>
                    <div class="control">
                        <input id="input-right" class="input is-medium is-danger" type="text" placeholder="항목 B 입력" />
                    </div>
                </div>
                <div class="is-centered">
                    <button class="button is-link is-rounded is-large m-5" onclick="makeTopic()">주제 생성하기</button>
                    <button class="button is-light is-rounded is-large m-5" onclick="location.href='/'">돌아가기</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function makeTopic() {
            let left = $('#input-left').val();
            let right = $('#input-right').val();

            if (left == "" || right == "") {
                alert("항목을 모두 입력해주세요!");
                return;
            }

            $.ajax({
                type: "POST",
                url: "/api/topic",
                data: { left: left, right: right },
                success: function (response) {
                    alert(response.msg);
                    window.location.href = "/"; // 성공 시 메인 페이지로 이동
                },
                error: function (error) {
                    alert("주제 생성에 실패했습니다.");
                }
            });
        }
    </script>
</body>

</html>
