<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <style>
      .option {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        border-radius: 10px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="battle">
      <div class="option windows" id="opt-win" onclick="vote('win')">
        <div class="icon-circle">W</div>
        <div class="option-name">Windows</div>
        <div class="option-desc">The world's most widely used desktop OS</div>
      </div>

      <div class="vs-badge">vs</div>

      <div class="option macos" id="opt-mac" onclick="vote('mac')">
        <div class="icon-circle">M</div>
        <div class="option-name">macOS</div>
        <div class="option-desc">
          Apple's sleek and powerful operating system
        </div>
      </div>
    </div>

    <!-- 이 부분은 절대 지우지 마세요. -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 이 부분은 절대 지우지 마세요. -->

    <script>
      function vote(option) {
        $.ajax({
          type: "POST",
          url: "/vote",
          data: { option: option },
          success: function (response) {
            alert(response);
          },
          error: function (error) {
            console.error("Error:", error);
          },
        });
      }
    </script>
  </body>
</html>
